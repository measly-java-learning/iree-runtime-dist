name: spike-tsan-aslr

# THROWAWAY SPIKE (plan Task 0 / spec §7). Answers one question on a real
# GitHub-hosted runner: does TSan run reliably in an unprivileged container, and
# does lowering vm.mmap_rnd_bits on the runner host (not namespaced, so the
# container inherits it) drive the "unexpected memory mapping" failure rate to 0?
# workflow_dispatch only -- never fires on push. Delete once the answer is recorded.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Runner ASLR baseline
        run: |
          echo "kernel:            $(uname -r)"
          echo "mmap_rnd_bits:     $(cat /proc/sys/vm/mmap_rnd_bits)"
          echo "randomize_va_space:$(cat /proc/sys/kernel/randomize_va_space)"

      # Use the project's own toolchain image so the TSan runtime under test is
      # exactly the one the tsan variant is built with (clang 21.1.8, manylinux
      # 2.28). This is a cache hit from the main-branch warm-build-image run.
      - name: Resolve build image identity
        env:
          PLATFORM: linux-x86_64
        run: |
          . scripts/lib/naming.sh
          {
            echo "BUILD_IMAGE=$(build_image_tag "$PLATFORM")"
            echo "BUILD_DOCKERFILE=$(build_dockerfile "$PLATFORM")"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Build (cache-hit) the toolchain image
        uses: docker/build-push-action@v7.3.0
        with:
          context: docker
          file: ${{ env.BUILD_DOCKERFILE }}
          tags: ${{ env.BUILD_IMAGE }}
          load: true
          cache-from: type=gha

      - name: Write the toy race probe
        run: |
          mkdir -p spike
          cat > spike/race.c <<'EOF'
          #include <pthread.h>
          static int g;
          static void* w(void* a) { (void)a; g++; return 0; }
          int main(void) {
            pthread_t t;
            pthread_create(&t, 0, w, 0);
            g++;
            pthread_join(t, 0);
            return g;
          }
          EOF

      # A successful TSan run prints a "data race" WARNING (expected -- the toy
      # deliberately races) and counts as OK: TSan worked. The failure we measure
      # is the "unexpected memory mapping" FATAL, which is the ASLR-entropy problem.
      - name: Probe at DEFAULT entropy (expect many failures)
        run: |
          docker run --rm -v "$PWD/spike":/spike -w /spike "${BUILD_IMAGE}" bash -lc '
            clang -fsanitize=thread -O1 -g race.c -o race
            ok=0; mapfail=0
            for i in $(seq 1 200); do
              out="$(./race 2>&1 || true)"
              if echo "$out" | grep -q "unexpected memory mapping\|FATAL: ThreadSanitizer"; then
                mapfail=$((mapfail+1))
              else
                ok=$((ok+1))
              fi
            done
            echo "DEFAULT (mmap_rnd_bits=$(cat /proc/sys/vm/mmap_rnd_bits)): ok=$ok mapfail=$mapfail / 200"
          '

      - name: Lower entropy on the HOST, then probe again (expect 0 failures)
        run: |
          sudo sysctl -w vm.mmap_rnd_bits=28
          docker run --rm -v "$PWD/spike":/spike -w /spike "${BUILD_IMAGE}" bash -lc '
            echo "container sees mmap_rnd_bits=$(cat /proc/sys/vm/mmap_rnd_bits)"
            ok=0; mapfail=0
            for i in $(seq 1 200); do
              out="$(./race 2>&1 || true)"
              if echo "$out" | grep -q "unexpected memory mapping\|FATAL: ThreadSanitizer"; then
                mapfail=$((mapfail+1))
              else
                ok=$((ok+1))
              fi
            done
            echo "LOWERED (mmap_rnd_bits=$(cat /proc/sys/vm/mmap_rnd_bits)): ok=$ok mapfail=$mapfail / 200"
            if [ "$mapfail" -ne 0 ]; then
              echo "SPIKE RESULT: host-sysctl fix INSUFFICIENT ($mapfail/200 still failed)"; exit 1
            fi
            echo "SPIKE RESULT: host-sysctl fix WORKS (0/200 failures) -- gate B/C is viable in CI"
          '
