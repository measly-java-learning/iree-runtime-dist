name: release
on:
  push:
    tags: ['v*-*']          # v<iree-version>-<pkgrev>, e.g. v3.11.0-1

permissions:
  contents: read

# BUILD_IMAGE is no longer a single static tag: the toolchain image is
# per-platform (see scripts/lib/naming.sh's build_image_tag/build_dockerfile),
# so each build/verify job resolves its own tag and Dockerfile from the matrix
# platform into $GITHUB_ENV. A repo-wide env would force one hard-coded arch.

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      iree_version: ${{ steps.derive.outputs.iree_version }}
      iree_tag: ${{ steps.derive.outputs.iree_tag }}
      compiler_version: ${{ steps.derive.outputs.compiler_version }}
      submodules: ${{ steps.submodules.outputs.list }}
      platforms: ${{ steps.platforms.outputs.list }}
      variants: ${{ steps.variants.outputs.list }}
    steps:
      - uses: actions/checkout@v7
      - id: derive
        # `shell: bash` makes Actions invoke
        # `bash --noprofile --norc -eo pipefail {0}`, so the pipeline's exit
        # status is the failure of any stage, not just the last.
        shell: bash
        run: bash scripts/derive-version.sh "${GITHUB_REF_NAME}" | tr 'A-Z' 'a-z' >> "$GITHUB_OUTPUT"
      - id: submodules
        run: |
          . scripts/lib/submodules.sh
          echo "list=$(required_submodules)" >> "$GITHUB_OUTPUT"
      - id: platforms
        # Single source of truth for the platform list (scripts/lib/naming.sh)
        # threaded into the build/verify job matrices below via fromJson(),
        # rather than a third and fourth hard-coded "linux-x86_64" here.
        run: |
          . scripts/lib/naming.sh
          echo "list=$(platforms_json)" >> "$GITHUB_OUTPUT"
      - id: variants
        run: |
          . scripts/lib/variants.sh
          echo "list=$(variants_json)" >> "$GITHUB_OUTPUT"
      - run: bash test/run.sh

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.variants) }}
        platform: ${{ fromJson(needs.setup.outputs.platforms) }}
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          path: dist

      # NEVER use submodules: recursive -- third_party/llvm-project alone is 2.6 GB
      # and is unnecessary with IREE_BUILD_COMPILER=OFF. The required set is the
      # tested constant in scripts/lib/submodules.sh, threaded through as
      # needs.setup.outputs.submodules.
      - uses: actions/checkout@v7
        with:
          repository: iree-org/iree
          ref: ${{ needs.setup.outputs.iree_tag }}
          path: iree
          submodules: false
          fetch-depth: 1
      - name: Init required submodules only
        working-directory: iree
        run: git submodule update --init --depth 1 ${{ needs.setup.outputs.submodules }}

      # Rather than duplicate the pinned `dnf install` NEVRAs inline in this
      # workflow build an image placed in the GHA cache (no GHCR publish etc.)
      #
      # Paths are `dist/`-prefixed because this job checks the repo out to
      # `path: dist` (to leave room for `iree/` alongside it). build-push-action
      # resolves `context`/`file` against the workspace root, and `uses:` steps
      # ignore `working-directory`, so a bare `docker` here is a nonexistent path.
      - name: Resolve build image identity
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          . dist/scripts/lib/naming.sh
          {
            echo "BUILD_IMAGE=$(build_image_tag "$PLATFORM")"
            echo "BUILD_DOCKERFILE=dist/$(build_dockerfile "$PLATFORM")"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Build the pinned toolchain image
        uses: docker/build-push-action@v7.3.0
        with:
          context: dist/docker
          file: ${{ env.BUILD_DOCKERFILE }}
          tags: ${{ env.BUILD_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build in manylinux
        # UID/GID needs to be set here unlike w/ ExecuTorch dist because this runs
        # one step in a locally build container vs. the other which uses the widely available `manylinux`
        # container.
        run: |
          docker run --rm \
            -v "${PWD}/dist":/work -v "${PWD}/iree":/iree \
            -e COMPILER_VERSION="${{ needs.setup.outputs.compiler_version }}" \
            -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" \
            -w /work "${BUILD_IMAGE}" \
            bash -lc '
              set -euo pipefail
              export PATH=/opt/python/cp312-cp312/bin:$PATH
              ./build-runtime.sh --variant ${{ matrix.variant }} --platform ${{ matrix.platform }} \
                --prefix /work/out --iree-src /iree
            '

      - name: Structural checks
        working-directory: dist
        run: |
          bash test/build_smoke.sh out
          bash test/manifest.test.sh out
          bash test/constants.test.sh out
          bash test/notices.test.sh out
          bash test/cmake_additions.test.sh out

      - name: Package
        working-directory: dist
        run: |
          bash scripts/package.sh out \
            "${{ needs.setup.outputs.iree_version }}" \
            "${{ matrix.variant }}" "${{ matrix.platform }}" assets

      - uses: actions/attest@v4
        with:
          subject-path: dist/assets/*.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: assets-${{ matrix.variant }}-${{ matrix.platform }}
          path: dist/assets/

  verify:
    # The acceptance gate. Runs in a container that has never seen the build tree
    # or the IREE source -- exactly the consumer's situation. Only the extracted
    # tarball and the test/consumer harness are mounted in.
    needs: [setup, build]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.variants) }}
        platform: ${{ fromJson(needs.setup.outputs.platforms) }}
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: assets-${{ matrix.variant }}-${{ matrix.platform }}
          path: assets

      - name: Verify checksum
        working-directory: assets
        run: sha256sum -c ./*.sha256

      - name: Extract
        run: |
          mkdir -p extracted
          tar -xzf assets/*.tar.gz -C extracted

      # Same container decision as the build job: rebuild the toolchain image
      # against the GHA layer cache rather than pulling a registry image or
      # duplicating the dnf install pins inline. This is a cache hit in the
      # common case (the build job already populated the cache in this same
      # workflow run), so the toolchain install is not repeated in practice.
      #
      # No `dist/` prefix here: this job checks out to the workspace root, so
      # the Dockerfile path and context are unprefixed. workflow_paths.test.sh
      # enforces that this prefix matches the job's checkout root.
      - name: Resolve build image identity
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          . scripts/lib/naming.sh
          {
            echo "BUILD_IMAGE=$(build_image_tag "$PLATFORM")"
            echo "BUILD_DOCKERFILE=$(build_dockerfile "$PLATFORM")"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Build the pinned toolchain image
        uses: docker/build-push-action@v7.3.0
        with:
          context: docker
          file: ${{ env.BUILD_DOCKERFILE }}
          tags: ${{ env.BUILD_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

        # TODO: This should be moved into a script rather than inlined in the GHA
        # Note that the docker execution doesn't need UID/GID because nothing needs to leave
        # the container with predictable ownership permissions
        # TBH, `ubuntu-latest` includes clang, could probably run the build without
        # laundering through Docker
      - name: Lower ASLR entropy for in-container TSan (host-level, not namespaced)
        # TSan's shadow mapping needs mmap_rnd_bits low enough; the x86_64 default
        # (32) is too high for it. Best-effort lower to 28: `sysctl -w` itself
        # refuses to exceed the kernel's ceiling (that IS the clamp), so tolerate
        # a failed write -- every case where the write is refused (value already
        # <= 28, knob absent, ceiling below 28) is one where TSan is already fine,
        # and a genuinely-needed-but-unset value surfaces later as an explicit
        # TSan mapping error, not a silent pass. Do NOT read mmap_rnd_bits_max:
        # it is absent on some hosted runners and reading it under set -e killed
        # this step. Reads tolerate a missing knob so diagnostics never abort.
        if: matrix.variant == 'tsan'
        run: |
          before=$(cat /proc/sys/vm/mmap_rnd_bits 2>/dev/null || echo "<absent>")
          sudo sysctl -w vm.mmap_rnd_bits=28 2>/dev/null || true
          after=$(cat /proc/sys/vm/mmap_rnd_bits 2>/dev/null || echo "<absent>")
          echo "vm.mmap_rnd_bits: before=$before after=$after (target 28; lower is safe for TSan)"

      - name: Consumer e2e in a clean container
        run: |
          mapfile -d '' -t prefixes < <(find extracted -maxdepth 1 -mindepth 1 -type d -print0)
          if [ "${#prefixes[@]}" -ne 1 ]; then
            echo "error: expected exactly one top-level directory in the extracted tarball, found ${#prefixes[@]}:" >&2
            printf '  %s\n' "${prefixes[@]}" >&2
            exit 1
          fi
          prefix="${prefixes[0]}"
          docker run --rm \
            -v "${PWD}/test":/test:ro -v "${PWD}/${prefix}":/prefix:ro \
            -w /tmp "${BUILD_IMAGE}" \
            bash -lc '
              set -euo pipefail
              export PATH=/opt/python/cp312-cp312/bin:$PATH
              cp -r /test /tmp/t && cp -r /prefix /tmp/p
              bash /tmp/t/consumer/run.sh /tmp/p
            '

  pin:
    needs: [setup, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: downloaded
          merge-multiple: true
      - run: |
          bash scripts/gen-pin.sh \
            "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" \
            "${{ needs.setup.outputs.iree_version }}" \
            downloaded IreeRuntimePin.cmake
      - uses: actions/upload-artifact@v7
        with:
          name: pin
          path: IreeRuntimePin.cmake

  release:
    needs: [setup, verify, pin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Build the metadata zip (once per release; variant-independent)
        run: |
          mkdir -p meta-extract
          tar -xzf release/iree-runtime-*-default-linux-x86_64.tar.gz -C meta-extract
          prefix="$(find meta-extract -maxdepth 1 -mindepth 1 -type d)"
          bash scripts/package-metadata.sh "$prefix" "${{ needs.setup.outputs.iree_version }}" release

      - name: Render release notes
        # scripts/lib/naming.sh's asset_stem/tarball_name/sha_name are the
        # single source of truth for asset filenames (scripts/package.sh and
        # scripts/gen-pin.sh already go through them). Hand-reconstructing
        # the same strings here in YAML prose is exactly the kind of second
        # copy that can silently drift from what was actually published --
        # so the asset names in this body are generated by sourcing that
        # same library over the same variant/platform lists the build matrix
        # used (scripts/lib/variants.sh's known_variants, and
        # needs.setup.outputs.platforms via naming.sh's own PLATFORMS), not
        # retyped. The prose framing (the pairing note, the pip-wheel caveat)
        # stays literal -- it isn't derived from any script, so generating it
        # would just move hand-written text from one file to another.
        run: |
          . scripts/lib/naming.sh
          . scripts/lib/variants.sh
          version="${{ needs.setup.outputs.iree_version }}"
          {
            variant_platform_list=""
            for variant in $(known_variants); do
              for platform in $(known_platforms); do
                variant_platform_list="${variant_platform_list}\`${variant}\`/\`${platform}\`, "
              done
            done
            variant_platform_list="${variant_platform_list%, }"

            echo "IREE runtime ${version} (${variant_platform_list})."
            echo ""
            echo "**Pair with \`iree-base-compiler==${{ needs.setup.outputs.compiler_version }}\`.**"
            echo "Modules compiled by a different compiler version may fail to load with a VM"
            echo "import signature mismatch. See \`share/iree-runtime-dist/manifest.json\`."
            echo ""
            echo "The pip \`iree-base-runtime\` wheel is not linkable at any version; use this artifact."
            echo ""
            echo "Verify before consuming:"
            echo '```'
            for variant in $(known_variants); do
              for platform in $(known_platforms); do
                tb="$(tarball_name "$version" "$variant" "$platform")"
                echo "sha256sum -c $(sha_name "$version" "$variant" "$platform")"
                echo "gh attestation verify ${tb} --repo ${{ github.repository }}"
              done
            done
            echo '```'
          } > release-notes.md
          cat release-notes.md

      - name: Create/Update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/*.tar.gz \
            release/*.sha256 \
            release/IreeRuntimePin.cmake \
            release/iree-runtime-metadata-*.zip \
            --title "${GITHUB_REF_NAME}" \
            -F release-notes.md \
          || gh release upload "${GITHUB_REF_NAME}" \
            release/*.tar.gz \
            release/*.sha256 \
            release/IreeRuntimePin.cmake \
            release/iree-runtime-metadata-*.zip \
            --clobber

